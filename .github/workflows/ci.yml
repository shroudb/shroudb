name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  check:
    name: Check & Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Configure git auth for private deps
        run: git config --global url."https://x-access-token:${{ secrets.GH_PAT }}@github.com/".insteadOf "https://github.com/"
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Configure git auth for private deps
        run: git config --global url."https://x-access-token:${{ secrets.GH_PAT }}@github.com/".insteadOf "https://github.com/"
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace

  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Configure git auth for private deps
        run: git config --global url."https://x-access-token:${{ secrets.GH_PAT }}@github.com/".insteadOf "https://github.com/"
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo install cargo-audit --quiet
      - run: cargo audit --ignore RUSTSEC-2023-0071 --ignore RUSTSEC-2023-0089

  deny:
    name: Dependency Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Configure git auth for private deps
        run: git config --global url."https://x-access-token:${{ secrets.GH_PAT }}@github.com/".insteadOf "https://github.com/"
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo install cargo-deny --quiet
      - run: cargo deny check

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Configure git auth for private deps
        run: git config --global url."https://x-access-token:${{ secrets.GH_PAT }}@github.com/".insteadOf "https://github.com/"
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  release:
    name: Release (${{ matrix.target }})
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [check, test, fmt]
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
    steps:
      - uses: actions/checkout@v5
      - name: Configure git auth for private deps
        run: git config --global url."https://x-access-token:${{ secrets.GH_PAT }}@github.com/".insteadOf "https://github.com/"
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install musl tools (Linux x86_64)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Install cross (Linux aarch64)
        if: matrix.target == 'aarch64-unknown-linux-musl'
        run: curl -fsSL https://github.com/cross-rs/cross/releases/latest/download/cross-x86_64-unknown-linux-musl.tar.gz | sudo tar xz -C /usr/local/bin

      - name: Build (cargo)
        if: matrix.target != 'aarch64-unknown-linux-musl'
        run: cargo build --release --target ${{ matrix.target }} -p shroudb -p shroudb-cli

      - name: Build (cross)
        if: matrix.target == 'aarch64-unknown-linux-musl'
        run: cross build --release --target ${{ matrix.target }} -p shroudb -p shroudb-cli

      - name: Package
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/shroudb dist/
          cp target/${{ matrix.target }}/release/shroudb-cli dist/
          cd dist && tar czf shroudb-${{ github.ref_name }}-${{ matrix.target }}.tar.gz shroudb shroudb-cli && cd ..
          rm dist/shroudb dist/shroudb-cli

      - name: Upload release artifacts
        uses: actions/upload-artifact@v5
        with:
          name: release-${{ matrix.target }}
          path: dist/*.tar.gz

  docker-rc:
    name: Docker RC (${{ matrix.image }})
    if: startsWith(github.ref, 'refs/tags/v') && contains(github.ref, '-rc')
    needs: [check, test, fmt]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - image: shroudb
            target: shroudb
          - image: cli
            target: shroudb-cli
    steps:
      - uses: actions/checkout@v5
      - name: Configure git auth for private deps
        run: git config --global url."https://x-access-token:${{ secrets.GH_PAT }}@github.com/".insteadOf "https://github.com/"
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          target: ${{ matrix.target }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/shroudb/${{ matrix.image }}:${{ github.ref_name }}
          provenance: true
          sbom: true
          secrets: |
            git_auth=https://x-access-token:${{ secrets.GH_PAT }}@github.com/
          cache-from: type=gha
          cache-to: type=gha,mode=max

  docker-release:
    name: Docker Release (${{ matrix.image }})
    if: startsWith(github.ref, 'refs/tags/v') && !contains(github.ref, '-rc')
    needs: [check, test, fmt]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - image: shroudb
            target: shroudb
          - image: cli
            target: shroudb-cli
    steps:
      - uses: actions/checkout@v5
      - name: Configure git auth for private deps
        run: git config --global url."https://x-access-token:${{ secrets.GH_PAT }}@github.com/".insteadOf "https://github.com/"
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          target: ${{ matrix.target }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            shroudb/${{ matrix.image }}:${{ github.ref_name }}
            shroudb/${{ matrix.image }}:latest
            ghcr.io/shroudb/${{ matrix.image }}:${{ github.ref_name }}
            ghcr.io/shroudb/${{ matrix.image }}:latest
          provenance: true
          sbom: true
          secrets: |
            git_auth=https://x-access-token:${{ secrets.GH_PAT }}@github.com/
          cache-from: type=gha
          cache-to: type=gha,mode=max

  publish-release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/v') && !contains(github.ref, '-rc')
    needs: [release]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v5
        with:
          path: artifacts
          pattern: release-*
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.tar.gz
          generate_release_notes: true
      - name: Update Homebrew formula
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          gh api repos/shroudb/homebrew-tap/dispatches \
            -f event_type=formula-update \
            -f "client_payload[formula]=shroudb" \
            -f "client_payload[version]=$VERSION"
