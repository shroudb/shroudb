name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  check:
    name: Check & Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/checkout@v5
        with:
          repository: keyva-io/commons
          token: ${{ secrets.COMMONS_TOKEN || secrets.GITHUB_TOKEN }}
          path: commons
      - run: ln -s $GITHUB_WORKSPACE/commons ../commons
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/checkout@v5
        with:
          repository: keyva-io/commons
          token: ${{ secrets.COMMONS_TOKEN || secrets.GITHUB_TOKEN }}
          path: commons
      - run: ln -s $GITHUB_WORKSPACE/commons ../commons
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace

  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/checkout@v5
        with:
          repository: keyva-io/commons
          token: ${{ secrets.COMMONS_TOKEN || secrets.GITHUB_TOKEN }}
          path: commons
      - run: ln -s $GITHUB_WORKSPACE/commons ../commons
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo install cargo-audit --quiet
      - run: cargo audit --ignore RUSTSEC-2023-0071 --ignore RUSTSEC-2023-0089

  deny:
    name: Dependency Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/checkout@v5
        with:
          repository: keyva-io/commons
          token: ${{ secrets.COMMONS_TOKEN || secrets.GITHUB_TOKEN }}
          path: commons
      - run: ln -s $GITHUB_WORKSPACE/commons ../commons
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo install cargo-deny --quiet
      - run: cargo deny check

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/checkout@v5
        with:
          repository: keyva-io/commons
          token: ${{ secrets.COMMONS_TOKEN || secrets.GITHUB_TOKEN }}
          path: commons
      - run: ln -s $GITHUB_WORKSPACE/commons ../commons
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  release:
    name: Release (${{ matrix.target }})
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [check, test, fmt]
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/checkout@v5
        with:
          repository: keyva-io/commons
          token: ${{ secrets.COMMONS_TOKEN || secrets.GITHUB_TOKEN }}
          path: commons
      - run: ln -s $GITHUB_WORKSPACE/commons ../commons
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install musl tools (Linux)
        if: contains(matrix.target, 'linux-musl')
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Install cross (aarch64 Linux)
        if: matrix.target == 'aarch64-unknown-linux-musl'
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build (native)
        if: matrix.target != 'aarch64-unknown-linux-musl'
        run: cargo build --release --target ${{ matrix.target }} -p keyva -p keyva-auth -p keyva-cli

      - name: Build (cross)
        if: matrix.target == 'aarch64-unknown-linux-musl'
        run: cross build --release --target ${{ matrix.target }} -p keyva -p keyva-auth -p keyva-cli

      - name: Package
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/keyva dist/
          cp target/${{ matrix.target }}/release/keyva-cli dist/
          cp target/${{ matrix.target }}/release/keyva-auth dist/
          cd dist
          tar czf keyva-${{ github.ref_name }}-${{ matrix.target }}.tar.gz keyva keyva-cli keyva-auth

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: keyva-${{ matrix.target }}
          path: dist/*.tar.gz

  docker:
    name: Docker Image
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [check, test, fmt]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5
        with:
          path: keyva
      - uses: actions/checkout@v5
        with:
          repository: keyva-io/commons
          token: ${{ secrets.COMMONS_TOKEN || secrets.GITHUB_TOKEN }}
          path: commons
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: keyva/Dockerfile
          push: true
          tags: |
            ghcr.io/keyva-io/keyva:${{ github.ref_name }}
            ghcr.io/keyva-io/keyva:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  publish-release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [release]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: keyva-*
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.tar.gz
          generate_release_notes: true
