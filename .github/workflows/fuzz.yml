name: Fuzz

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly deep fuzz: Sunday at 03:00 UTC
    - cron: "0 3 * * 0"

env:
  CARGO_TERM_COLOR: always
  CARGO_REGISTRIES_SHROUDB_CRATESIO_TOKEN: ${{ secrets.REGISTRY_TOKEN }}
  CARGO_REGISTRIES_SHROUDB_TOKEN: ${{ secrets.REGISTRY_TOKEN }}
  PATH: /home/nlucas/.cargo/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin

jobs:
  fuzz:
    name: Fuzz
    runs-on: self-hosted
    strategy:
      fail-fast: false
      matrix:
        target:
          - resp3_parser
          - command_parser
          - wal_entry
          - config_parser
          - acl_check
          - meta_schema_validate
    steps:
      - uses: actions/checkout@v5

      - name: Configure registry
        run: |
          mkdir -p ~/.cargo
          cat > ~/.cargo/config.toml << 'EOF'
          [source.crates-io]
          replace-with = "shroudb-cratesio"
          [source.shroudb-cratesio]
          registry = "sparse+https://crates.shroudb.dev/api/v1/cratesio/"
          [registries.shroudb-cratesio]
          index = "sparse+https://crates.shroudb.dev/api/v1/cratesio/"
          credential-provider = ["cargo:token"]
          [registries.shroudb]
          index = "sparse+https://crates.shroudb.dev/api/v1/crates/"
          credential-provider = ["cargo:token"]
          EOF

      - name: Install nightly toolchain
        run: rustup toolchain install nightly --profile minimal

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked --quiet

      - name: Restore corpus cache
        uses: actions/cache@v4
        with:
          path: fuzz/corpus/${{ matrix.target }}
          key: fuzz-corpus-${{ matrix.target }}-${{ github.sha }}
          restore-keys: |
            fuzz-corpus-${{ matrix.target }}-

      - name: Set fuzz duration
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            echo "FUZZ_SECONDS=300" >> "$GITHUB_ENV"
          else
            echo "FUZZ_SECONDS=30" >> "$GITHUB_ENV"
          fi

      - name: Fuzz ${{ matrix.target }}
        working-directory: fuzz
        run: |
          cargo +nightly fuzz run ${{ matrix.target }} -- \
            -max_total_time=${{ env.FUZZ_SECONDS }} \
            -max_len=4096

      - name: Upload crash artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-crashes-${{ matrix.target }}
          path: fuzz/artifacts/${{ matrix.target }}/
          retention-days: 30
