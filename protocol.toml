description = "List credential IDs with optional filtering and pagination"
replica_behavior = "pure_read"

[[commands.keys.params]]
name = "keyspace"
type = "keyspace"
required = true
position = 1
description = "Target keyspace name"

[[commands.keys.params]]
name = "cursor"
type = "token"
required = false
key = "CURSOR"
description = "Resume from a previous scan cursor"

[[commands.keys.params]]
name = "pattern"
type = "token"
required = false
key = "MATCH"
description = "Glob-style pattern to filter credential IDs"

[[commands.keys.params]]
name = "state_filter"
