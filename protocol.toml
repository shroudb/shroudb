[[commands.keys.response]]
name = "keys"
type = "json_value"
description = "Array of credential ID strings"

[[commands.keys.errors]]
code = "BADARG"
condition = "Missing keyspace, invalid COUNT or STATE"

[[commands.keys.errors]]
code = "DISABLED"
