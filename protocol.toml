type = "keyspace"
required = false
position = 1
description = "Check a specific keyspace (omit for server-level)"

[[commands.health.response]]
name = "state"
type = "token"
optional = true
description = "Engine state (e.g. 'ready')"

[[commands.health.response]]
name = "keyspaces"
type = "json_value"
optional = true
description = "Per-keyspace credential counts"

[[commands.health.response]]
name = "count"
type = "integer"
optional = true
description = "Credential count (keyspace-level)"

[[commands.health.errors]]
code = "NOTFOUND"
condition = "Specified keyspace does not exist"

[[commands.health.errors]]
code = "NOTREADY"
