# ShrouDB Protocol Specification
#
# Machine-readable definition of the ShrouDB protocol.
# Used by shroudb-codegen to generate typed client libraries in any language.
#
# Analogous to an OpenAPI spec, but for ShrouDB's command protocol.

[protocol]
name = "shroudb"
version = "0.1.0"
description = "Credential management server"
default_port = 6399
uri_schemes = ["shroudb://", "shroudb+tls://"]
uri_format = "{scheme}[token@]host[:port][/keyspace]"

[protocol.wire_format]
type = "resp3"
request_format = "array_of_bulk_strings"
success_envelope = "map"
error_envelope = "simple_error"
success_status_field = "status"
success_status_value = "OK"

# ─── Error codes ──────────────────────────────────────────────────────────────

[error_codes]

[error_codes.DENIED]
description = "Authentication required or insufficient permissions"
http_equiv = 401

[error_codes.NOTFOUND]
description = "Credential, keyspace, or resource does not exist"
http_equiv = 404

[error_codes.BADARG]
description = "Missing or malformed command argument"
http_equiv = 400

[error_codes.VALIDATION_ERROR]
description = "Metadata or claims failed schema validation"
http_equiv = 422

[error_codes.WRONGTYPE]
description = "Operation not supported for this keyspace type"
http_equiv = 400

[error_codes.STATE_ERROR]
description = "Credential is in wrong state for this operation"
http_equiv = 409

[error_codes.EXPIRED]
description = "Credential has expired"
http_equiv = 410

[error_codes.REUSE_DETECTED]
description = "Refresh token reuse detected — family revoked"
http_equiv = 409

[error_codes.CHAIN_LIMIT]
description = "Refresh token chain limit exceeded"
http_equiv = 429

[error_codes.DISABLED]
description = "Keyspace is disabled"
http_equiv = 503

[error_codes.NOTREADY]
description = "Server is not ready (still starting up)"
http_equiv = 503

[error_codes.STORAGE]
description = "Storage engine error"
http_equiv = 500

[error_codes.CRYPTO]
description = "Cryptographic operation failed"
http_equiv = 500

[error_codes.LOCKED]
description = "Account temporarily locked due to too many failed attempts"
http_equiv = 429

[error_codes.INTERNAL]
description = "Unexpected internal error"
http_equiv = 500

# ─── Types ────────────────────────────────────────────────────────────────────

[types.keyspace]
description = "Keyspace name (alphanumeric + hyphens)"
wire_type = "bulk_string"
rust_type = "String"
python_type = "str"
typescript_type = "string"

[types.credential_id]
description = "Unique credential identifier"
wire_type = "bulk_string"
rust_type = "String"
python_type = "str"
typescript_type = "string"

[types.token]
description = "Bearer token, API key, or refresh token"
wire_type = "bulk_string"
rust_type = "String"
python_type = "str"
typescript_type = "string"

[types.json_value]
description = "JSON-encoded object"
wire_type = "bulk_string"
rust_type = "serde_json::Value"
python_type = "dict[str, Any]"
typescript_type = "Record<string, unknown>"

[types.integer]
description = "64-bit signed integer"
wire_type = "integer"
rust_type = "i64"
python_type = "int"
typescript_type = "number"

[types.boolean_flag]
description = "Presence flag (no value)"
wire_type = "flag"
rust_type = "bool"
python_type = "bool"
typescript_type = "boolean"

[types.unix_timestamp]
description = "Unix timestamp in seconds"
wire_type = "integer"
rust_type = "u64"
python_type = "int"
typescript_type = "number"

# ─── Commands ─────────────────────────────────────────────────────────────────

# ── ISSUE ─────────────────────────────────────────────────────────────────────

[commands.issue]
verb = "ISSUE"
description = "Issue a new credential in the given keyspace"
replica_behavior = "write"

[[commands.issue.params]]
name = "keyspace"
type = "keyspace"
required = true
position = 1
description = "Target keyspace name"

[[commands.issue.params]]
name = "claims"
type = "json_value"
required = false
key = "CLAIMS"
description = "JWT claims object (JWT keyspaces only)"

[[commands.issue.params]]
name = "metadata"
type = "json_value"
required = false
key = "META"
description = "Metadata to attach to the credential"

[[commands.issue.params]]
name = "ttl_secs"
type = "integer"
required = false
key = "TTL"
description = "Time-to-live in seconds"

[[commands.issue.params]]
name = "idempotency_key"
type = "token"
required = false
key = "IDEMPOTENCY_KEY"
description = "Prevents duplicate issuance within 5 min"

[[commands.issue.response]]
name = "credential_id"
type = "credential_id"
description = "Unique credential identifier"

[[commands.issue.response]]
name = "token"
type = "token"
description = "The issued token/key"

[[commands.issue.response]]
name = "expires_at"
type = "unix_timestamp"
optional = true
description = "Expiration timestamp (if TTL set)"

[[commands.issue.response]]
name = "family_id"
type = "credential_id"
optional = true
description = "Refresh token family ID (refresh_token keyspaces only)"

[[commands.issue.errors]]
code = "BADARG"
condition = "Missing keyspace, invalid JSON, invalid TTL"

[[commands.issue.errors]]
code = "VALIDATION_ERROR"
condition = "Claims or metadata fail schema validation"

[[commands.issue.errors]]
code = "WRONGTYPE"
condition = "CLAIMS used on non-JWT keyspace"

[[commands.issue.errors]]
code = "DISABLED"
condition = "Keyspace is disabled"

[[commands.issue.errors]]
code = "STORAGE"
condition = "WAL write failed"

# ── VERIFY ────────────────────────────────────────────────────────────────────

[commands.verify]
verb = "VERIFY"
description = "Verify a credential (JWT, API key, or HMAC signature)"
replica_behavior = "observational_read"

[[commands.verify.params]]
name = "keyspace"
type = "keyspace"
required = true
position = 1
description = "Target keyspace name"

[[commands.verify.params]]
name = "token"
type = "token"
required = true
position = 2
description = "The token/key/signature to verify"

[[commands.verify.params]]
name = "payload"
type = "token"
required = false
key = "PAYLOAD"
description = "Original message for HMAC verification"

[[commands.verify.params]]
name = "check_revoked"
type = "boolean_flag"
required = false
key = "CHECKREV"
description = "Also check the revocation index"

[[commands.verify.response]]
name = "credential_id"
type = "credential_id"
description = "Credential identifier"

[[commands.verify.response]]
name = "claims"
type = "json_value"
optional = true
description = "Decoded JWT claims (JWT keyspaces only)"

[[commands.verify.response]]
name = "meta"
type = "json_value"
optional = true
description = "Attached metadata"

[[commands.verify.response]]
name = "state"
type = "token"
description = "Credential state (active, suspended)"

[[commands.verify.errors]]
code = "BADARG"
condition = "Missing keyspace or token"

[[commands.verify.errors]]
code = "NOTFOUND"
condition = "Credential does not exist"

[[commands.verify.errors]]
code = "EXPIRED"
condition = "Credential has expired"

[[commands.verify.errors]]
code = "STATE_ERROR"
condition = "Credential is suspended or revoked"

[[commands.verify.errors]]
code = "WRONGTYPE"
condition = "PAYLOAD used on non-HMAC keyspace"

[[commands.verify.errors]]
code = "DISABLED"
condition = "Keyspace is disabled"

[[commands.verify.errors]]
code = "CRYPTO"
condition = "Signature verification failed"

# ── REVOKE ────────────────────────────────────────────────────────────────────

[commands.revoke]
verb = "REVOKE"
description = "Revoke a credential by ID"
replica_behavior = "write"

[[commands.revoke.params]]
name = "keyspace"
type = "keyspace"
required = true
position = 1
description = "Target keyspace name"

[[commands.revoke.params]]
name = "credential_id"
type = "credential_id"
required = true
position = 2
description = "Credential to revoke"

[[commands.revoke.response]]
name = "revoked"
type = "integer"
optional = true
description = "Number of credentials revoked"

[[commands.revoke.errors]]
code = "BADARG"
condition = "Missing keyspace or credential ID"

[[commands.revoke.errors]]
code = "NOTFOUND"
condition = "Credential does not exist"

[[commands.revoke.errors]]
code = "STATE_ERROR"
condition = "Already revoked"

[[commands.revoke.errors]]
code = "DISABLED"
condition = "Keyspace is disabled"

[[commands.revoke.errors]]
code = "STORAGE"
condition = "WAL write failed"

# ── REVOKE FAMILY ─────────────────────────────────────────────────────────────

[commands.revoke_family]
verb = "REVOKE"
description = "Revoke all credentials in a refresh token family"
replica_behavior = "write"
variant = "family"

[[commands.revoke_family.params]]
name = "keyspace"
type = "keyspace"
required = true
position = 1
description = "Target keyspace name"

[[commands.revoke_family.params]]
name = "family_id"
type = "credential_id"
required = true
key = "FAMILY"
description = "Family ID to revoke"

[[commands.revoke_family.response]]
name = "revoked"
type = "integer"
description = "Number of credentials revoked"

[[commands.revoke_family.errors]]
code = "NOTFOUND"
condition = "Family does not exist"

[[commands.revoke_family.errors]]
code = "DISABLED"
condition = "Keyspace is disabled"

# ── REVOKE BULK ───────────────────────────────────────────────────────────────

[commands.revoke_bulk]
verb = "REVOKE"
description = "Bulk-revoke multiple credentials"
replica_behavior = "write"
variant = "bulk"

[[commands.revoke_bulk.params]]
name = "keyspace"
type = "keyspace"
required = true
position = 1
description = "Target keyspace name"

[[commands.revoke_bulk.params]]
name = "ids"
type = "credential_id"
required = true
key = "BULK"
variadic = true
description = "Credential IDs to revoke"

[[commands.revoke_bulk.response]]
name = "revoked"
type = "integer"
description = "Number of credentials revoked"

[[commands.revoke_bulk.errors]]
code = "BADARG"
condition = "No IDs provided"

[[commands.revoke_bulk.errors]]
code = "DISABLED"
condition = "Keyspace is disabled"

# ── REFRESH ───────────────────────────────────────────────────────────────────

[commands.refresh]
verb = "REFRESH"
description = "Exchange a refresh token for a new one"
replica_behavior = "write"

[[commands.refresh.params]]
name = "keyspace"
type = "keyspace"
required = true
position = 1
description = "Target keyspace name"

[[commands.refresh.params]]
name = "token"
type = "token"
required = true
position = 2
description = "Current refresh token"

[[commands.refresh.response]]
name = "credential_id"
type = "credential_id"
description = "New credential identifier"

[[commands.refresh.response]]
name = "token"
type = "token"
description = "New refresh token"

[[commands.refresh.response]]
name = "family_id"
type = "credential_id"
description = "Family ID (unchanged)"

[[commands.refresh.response]]
name = "expires_at"
type = "unix_timestamp"
description = "New token expiration"

[[commands.refresh.errors]]
code = "BADARG"
condition = "Missing keyspace or token"

[[commands.refresh.errors]]
code = "NOTFOUND"
condition = "Token does not exist"

[[commands.refresh.errors]]
code = "EXPIRED"
condition = "Token has expired"

[[commands.refresh.errors]]
code = "REUSE_DETECTED"
condition = "Token already consumed (family revoked)"

[[commands.refresh.errors]]
code = "CHAIN_LIMIT"
condition = "Refresh chain exceeded configured limit"

[[commands.refresh.errors]]
code = "WRONGTYPE"
condition = "Keyspace is not refresh_token type"

[[commands.refresh.errors]]
code = "DISABLED"
condition = "Keyspace is disabled"

# ── UPDATE ────────────────────────────────────────────────────────────────────

[commands.update]
verb = "UPDATE"
description = "Update metadata on an existing credential"
replica_behavior = "write"

[[commands.update.params]]
name = "keyspace"
type = "keyspace"
required = true
position = 1
description = "Target keyspace name"

[[commands.update.params]]
name = "credential_id"
type = "credential_id"
required = true
position = 2
description = "Credential to update"

[[commands.update.params]]
name = "metadata"
type = "json_value"
required = true
key = "META"
description = "Metadata fields to merge"

[[commands.update.errors]]
code = "BADARG"
condition = "Missing arguments or invalid JSON"

[[commands.update.errors]]
code = "NOTFOUND"
condition = "Credential does not exist"

[[commands.update.errors]]
code = "VALIDATION_ERROR"
condition = "Metadata fails schema validation"

[[commands.update.errors]]
code = "STATE_ERROR"
condition = "Credential is revoked"

[[commands.update.errors]]
code = "DISABLED"
condition = "Keyspace is disabled"

# ── INSPECT ───────────────────────────────────────────────────────────────────

[commands.inspect]
verb = "INSPECT"
description = "Retrieve full details about a credential"
replica_behavior = "pure_read"

[[commands.inspect.params]]
name = "keyspace"
type = "keyspace"
required = true
position = 1
description = "Target keyspace name"

[[commands.inspect.params]]
name = "credential_id"
type = "credential_id"
required = true
position = 2
description = "Credential to inspect"

[[commands.inspect.response]]
name = "credential_id"
type = "credential_id"
description = "Credential identifier"

[[commands.inspect.response]]
name = "state"
type = "token"
description = "active, suspended, or revoked"

[[commands.inspect.response]]
name = "created_at"
type = "unix_timestamp"
description = "Creation timestamp"

[[commands.inspect.response]]
name = "expires_at"
type = "unix_timestamp"
optional = true
description = "Expiration timestamp"

[[commands.inspect.response]]
name = "last_verified_at"
type = "unix_timestamp"
optional = true
description = "Last verification timestamp"

[[commands.inspect.response]]
name = "meta"
type = "json_value"
optional = true
description = "Attached metadata"

[[commands.inspect.response]]
name = "family_id"
type = "credential_id"
optional = true
description = "Family ID (refresh_token only)"

[[commands.inspect.errors]]
code = "BADARG"
condition = "Missing arguments"

[[commands.inspect.errors]]
code = "NOTFOUND"
condition = "Credential does not exist"

[[commands.inspect.errors]]
code = "DISABLED"
condition = "Keyspace is disabled"

# ── ROTATE ────────────────────────────────────────────────────────────────────

[commands.rotate]
verb = "ROTATE"
description = "Trigger signing key rotation for a keyspace"
replica_behavior = "write"

[[commands.rotate.params]]
name = "keyspace"
type = "keyspace"
required = true
position = 1
description = "Target keyspace name"

[[commands.rotate.params]]
name = "force"
type = "boolean_flag"
required = false
key = "FORCE"
description = "Rotate even if current key has not reached rotation age"

[[commands.rotate.params]]
name = "nowait"
type = "boolean_flag"
required = false
key = "NOWAIT"
description = "Return immediately without waiting"

[[commands.rotate.params]]
name = "dryrun"
type = "boolean_flag"
required = false
key = "DRYRUN"
description = "Preview without making changes"

[[commands.rotate.response]]
name = "new_key_id"
type = "token"
description = "ID of the newly created key"

[[commands.rotate.response]]
name = "old_key_id"
type = "token"
description = "ID of the key that entered drain mode"

[[commands.rotate.response]]
name = "dryrun"
type = "token"
optional = true
description = "'true' if this was a dry run"

[[commands.rotate.errors]]
code = "BADARG"
condition = "Missing keyspace"

[[commands.rotate.errors]]
code = "WRONGTYPE"
condition = "Keyspace does not support rotation"

[[commands.rotate.errors]]
code = "DISABLED"
condition = "Keyspace is disabled"

[[commands.rotate.errors]]
code = "STORAGE"
condition = "WAL write failed"

# ── JWKS ──────────────────────────────────────────────────────────────────────

[commands.jwks]
verb = "JWKS"
description = "Return the JSON Web Key Set for a JWT keyspace"
replica_behavior = "pure_read"

[[commands.jwks.params]]
name = "keyspace"
type = "keyspace"
required = true
position = 1
description = "Target JWT keyspace"

[[commands.jwks.response]]
name = "keys"
type = "json_value"
description = "Array of JWK objects (RFC 7517 §5)"

[[commands.jwks.errors]]
code = "BADARG"
condition = "Missing keyspace"

[[commands.jwks.errors]]
code = "WRONGTYPE"
condition = "Keyspace is not JWT type"

[[commands.jwks.errors]]
code = "DISABLED"
condition = "Keyspace is disabled"

# ── KEYSTATE ──────────────────────────────────────────────────────────────────

[commands.keystate]
verb = "KEYSTATE"
description = "Show the current key ring state for a keyspace"
replica_behavior = "pure_read"

[[commands.keystate.params]]
name = "keyspace"
type = "keyspace"
required = true
position = 1
description = "Target keyspace"

[[commands.keystate.response]]
name = "keys"
type = "json_value"
description = "Array of key info maps (key_id, state, created_at)"

[[commands.keystate.errors]]
code = "BADARG"
condition = "Missing keyspace"

[[commands.keystate.errors]]
code = "WRONGTYPE"
condition = "Keyspace does not have a key ring"

[[commands.keystate.errors]]
code = "DISABLED"
condition = "Keyspace is disabled"

