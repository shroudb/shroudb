# ShrouDB Protocol Specification
#
# Machine-readable definition of the ShrouDB v1 protocol.
# Used by shroudb-codegen to generate typed client libraries in any language.

[protocol]
name = "shroudb"
version = "1.0.0"
description = "Encrypted key-value database"
default_port = 6399
uri_schemes = ["shroudb://", "shroudb+tls://"]
uri_format = "{scheme}[token@]host[:port]"

[protocol.wire_format]
type = "resp3"
request_format = "array_of_bulk_strings"
success_envelope = "map"
error_envelope = "simple_error"
success_status_field = "status"
success_status_value = "OK"

# ─── Error codes ──────────────────────────────────────────────────────────────

[error_codes.NOT_FOUND]
description = "Key or resource does not exist"
http_equiv = 404

[error_codes.NAMESPACE_NOT_FOUND]
description = "Namespace does not exist"
http_equiv = 404

[error_codes.NAMESPACE_EXISTS]
description = "Namespace already exists"
http_equiv = 409

[error_codes.NAMESPACE_NOT_EMPTY]
description = "Namespace is not empty (use FORCE to override)"
http_equiv = 409

[error_codes.VERSION_NOT_FOUND]
description = "Requested version does not exist"
http_equiv = 404

[error_codes.VALIDATION_FAILED]
description = "Metadata validation failed against namespace schema"
http_equiv = 422

[error_codes.DENIED]
description = "Authentication required or insufficient permissions"
http_equiv = 401

[error_codes.NOT_AUTHENTICATED]
description = "No auth token provided on this connection"
http_equiv = 401

[error_codes.NOT_READY]
description = "Server is not in READY state"
http_equiv = 503

[error_codes.BAD_ARG]
description = "Missing or malformed command argument"
http_equiv = 400

[error_codes.PIPELINE_ABORTED]
description = "Pipeline command failed, all commands rolled back"
http_equiv = 409

# ─── Connection commands ──────────────────────────────────────────────────────

[commands.AUTH]
description = "Authenticate the connection with a token"
acl = "none"

[[commands.AUTH.params]]
name = "token"
type = "string"
required = true

[commands.AUTH.response]
actor = "string"

[commands.PING]
description = "Test connectivity"
acl = "none"

[commands.PING.response]
message = "string"

# ─── Data commands ────────────────────────────────────────────────────────────

[commands.PUT]
description = "Store a value at the given key. Auto-increments version."
acl = "write"

[[commands.PUT.params]]
name = "namespace"
type = "string"
required = true

[[commands.PUT.params]]
name = "key"
type = "string"
required = true

[[commands.PUT.params]]
name = "value"
type = "string"
required = false
description = "Positional (3rd arg) or via VALUE keyword"

[[commands.PUT.params]]
name = "VALUE"
type = "keyword_string"
required = false
description = "Explicit value keyword"

[[commands.PUT.params]]
name = "META"
type = "keyword_json"
required = false
description = "JSON metadata object"

[commands.PUT.response]
version = "integer"

[commands.GET]
description = "Retrieve the value at a key"
acl = "read"

[[commands.GET.params]]
name = "namespace"
type = "string"
required = true

[[commands.GET.params]]
name = "key"
type = "string"
required = true

[[commands.GET.params]]
name = "VERSION"
type = "keyword_integer"
required = false
description = "Specific version number"

[[commands.GET.params]]
name = "META"
type = "flag"
required = false
description = "Include metadata in response"

[commands.GET.response]
key = "bytes"
value = "bytes"
version = "integer"
metadata = "json?"

[commands.DELETE]
description = "Delete a key by writing a tombstone"
acl = "write"

[[commands.DELETE.params]]
name = "namespace"
type = "string"
required = true

[[commands.DELETE.params]]
name = "key"
type = "string"
required = true

[commands.DELETE.response]
version = "integer"

[commands.LIST]
description = "List active keys in a namespace"
acl = "read"

[[commands.LIST.params]]
name = "namespace"
type = "string"
required = true

[[commands.LIST.params]]
name = "PREFIX"
type = "keyword_string"
required = false

[[commands.LIST.params]]
name = "CURSOR"
type = "keyword_string"
required = false

[[commands.LIST.params]]
name = "LIMIT"
type = "keyword_integer"
required = false
default = 100

[commands.LIST.response]
keys = "array<bytes>"
cursor = "string?"

[commands.VERSIONS]
description = "Retrieve version history for a key (most recent first)"
acl = "read"

[[commands.VERSIONS.params]]
name = "namespace"
type = "string"
required = true

[[commands.VERSIONS.params]]
name = "key"
type = "string"
required = true

[[commands.VERSIONS.params]]
name = "LIMIT"
type = "keyword_integer"
required = false
default = 100

[[commands.VERSIONS.params]]
name = "FROM"
type = "keyword_integer"
required = false
description = "Start from this version number (descending)"

[commands.VERSIONS.response]
versions = "array<map{version: integer, state: string, updated_at: integer, actor: string}>"

# ─── Namespace commands ───────────────────────────────────────────────────────

[commands."NAMESPACE CREATE"]
description = "Create a new namespace"
acl = "admin"

[[commands."NAMESPACE CREATE".params]]
name = "name"
type = "string"
required = true

[[commands."NAMESPACE CREATE".params]]
name = "SCHEMA"
type = "keyword_json"
required = false

[[commands."NAMESPACE CREATE".params]]
name = "MAX_VERSIONS"
type = "keyword_integer"
required = false

[[commands."NAMESPACE CREATE".params]]
name = "TOMBSTONE_RETENTION"
type = "keyword_integer"
required = false
description = "Seconds to retain tombstones before compaction"

[commands."NAMESPACE DROP"]
description = "Drop a namespace"
acl = "admin"

[[commands."NAMESPACE DROP".params]]
name = "name"
type = "string"
required = true

[[commands."NAMESPACE DROP".params]]
name = "FORCE"
type = "flag"
required = false
description = "Drop even if namespace contains keys"

[commands."NAMESPACE LIST"]
description = "List namespaces (filtered by token grants)"
acl = "none"

[[commands."NAMESPACE LIST".params]]
name = "CURSOR"
type = "keyword_string"
required = false

[[commands."NAMESPACE LIST".params]]
name = "LIMIT"
type = "keyword_integer"
required = false
default = 100

[commands."NAMESPACE LIST".response]
namespaces = "array<string>"
cursor = "string?"

[commands."NAMESPACE INFO"]
description = "Get metadata about a namespace"
acl = "read"

[[commands."NAMESPACE INFO".params]]
name = "name"
type = "string"
required = true

[commands."NAMESPACE INFO".response]
name = "string"
key_count = "integer"
created_at = "integer"

[commands."NAMESPACE ALTER"]
description = "Update namespace configuration (enforce-on-write-only)"
acl = "admin"

[[commands."NAMESPACE ALTER".params]]
name = "name"
type = "string"
required = true

[[commands."NAMESPACE ALTER".params]]
name = "SCHEMA"
type = "keyword_json"
required = false

[[commands."NAMESPACE ALTER".params]]
name = "MAX_VERSIONS"
type = "keyword_integer"
required = false

[[commands."NAMESPACE ALTER".params]]
name = "TOMBSTONE_RETENTION"
type = "keyword_integer"
required = false

[commands."NAMESPACE VALIDATE"]
description = "Check existing entries against current MetaSchema"
acl = "read"

[[commands."NAMESPACE VALIDATE".params]]
name = "name"
type = "string"
required = true

[commands."NAMESPACE VALIDATE".response]
count = "integer"
reports = "array<map{key: bytes, version: integer, errors: array<string>}>"

# ─── Batch commands ───────────────────────────────────────────────────────────

[commands.PIPELINE]
description = "Execute commands atomically (all succeed or all roll back)"
acl = "none"

[[commands.PIPELINE.params]]
name = "count"
type = "integer"
required = true
description = "Number of commands that follow"

# ─── Streaming commands ───────────────────────────────────────────────────────

[commands.SUBSCRIBE]
description = "Subscribe to change events on a namespace"
acl = "read"

[[commands.SUBSCRIBE.params]]
name = "namespace"
type = "string"
required = true

[[commands.SUBSCRIBE.params]]
name = "KEY"
type = "keyword_string"
required = false

[[commands.SUBSCRIBE.params]]
name = "EVENTS"
type = "keyword_string_list"
required = false
description = "Event types: PUT, DELETE, or * for all"

[commands.UNSUBSCRIBE]
description = "End the current subscription"
acl = "none"

# ─── Operational commands ─────────────────────────────────────────────────────

[commands.HEALTH]
description = "Check server health"
acl = "none"

[commands.HEALTH.response]
message = "string"

[commands."CONFIG GET"]
description = "Read a runtime configuration value"
acl = "none"

[[commands."CONFIG GET".params]]
name = "key"
type = "string"
required = true

[commands."CONFIG GET".response]
key = "string"
value = "string?"

[commands."CONFIG SET"]
description = "Set a runtime configuration value (admin only)"
acl = "admin"

[[commands."CONFIG SET".params]]
name = "key"
type = "string"
required = true

[[commands."CONFIG SET".params]]
name = "value"
type = "string"
required = true

[commands."COMMAND LIST"]
description = "List all supported commands"
acl = "none"

[commands."COMMAND LIST".response]
count = "integer"
commands = "array<string>"
