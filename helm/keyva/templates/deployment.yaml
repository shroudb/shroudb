apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-keyva
  labels:
    app.kubernetes.io/name: keyva
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: keyva
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: keyva
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
        - name: keyva
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args: ["--config", "/etc/keyva/config.toml"]
          ports:
            - name: resp3
              containerPort: 6399
              protocol: TCP
            - name: rest
              containerPort: 8080
              protocol: TCP
          env:
            - name: KEYVA_MASTER_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.masterKey.existingSecret | default (printf "%s-keyva-master-key" .Release.Name) }}
                  key: {{ .Values.masterKey.secretKey }}
            - name: RUST_LOG
              value: "info"
          volumeMounts:
            - name: data
              mountPath: /data
            - name: config
              mountPath: /etc/keyva
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          livenessProbe:
            tcpSocket:
              port: resp3
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: resp3
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: config
          configMap:
            name: {{ .Release.Name }}-keyva-config
        {{- if .Values.persistence.enabled }}
        - name: data
          persistentVolumeClaim:
            claimName: {{ .Release.Name }}-keyva-data
        {{- else }}
        - name: data
          emptyDir: {}
        {{- end }}
