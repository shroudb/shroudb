apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-shroudb
  labels:
    app.kubernetes.io/name: shroudb
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.resp3Port }}
      targetPort: resp3
      protocol: TCP
      name: resp3
    - port: {{ .Values.service.metricsPort }}
      targetPort: metrics
      protocol: TCP
      name: metrics
  selector:
    app.kubernetes.io/name: shroudb
    app.kubernetes.io/instance: {{ .Release.Name }}
