{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "shroudb.fullname" . }}
  labels:
    {{- include "shroudb.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "shroudb.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    - ports:
        - port: 6399
          protocol: TCP
        - port: 9090
          protocol: TCP
    {{- with .Values.networkPolicy.additionalIngress }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
{{- end }}
