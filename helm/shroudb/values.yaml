replicaCount: 1

image:
  repository: shroudb
  pullPolicy: IfNotPresent
  tag: ""

service:
  type: ClusterIP
  resp3Port: 6399
  metricsPort: 9090

resources:
  limits:
    cpu: "1"
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi

persistence:
  enabled: true
  size: 10Gi
  storageClass: ""

# Set via --set or external secret
masterKey:
  existingSecret: ""
  secretKey: "master-key"

config: |
  [server]
  bind = "0.0.0.0:6399"
  metrics_bind = "0.0.0.0:9090"

  [storage]
  data_dir = "/data"
