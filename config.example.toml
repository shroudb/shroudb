# ShrouDB Configuration
#
# Copy to config.toml and adjust for your deployment.
#
# Master key: set SHROUDB_MASTER_KEY (hex) or SHROUDB_MASTER_KEY_FILE (path)
# as environment variables. Never put the master key in this file.
#
# Precedence: CLI flag > env var > this file > defaults
# See `shroudb --help` for CLI flags.

[server]
bind = "0.0.0.0:6399"
# tls_cert = "/etc/shroudb/tls/cert.pem"
# tls_key = "/etc/shroudb/tls/key.pem"
# tls_client_ca = "/etc/shroudb/tls/ca.pem"   # mTLS
# unix_socket = "/var/run/shroudb.sock"
# rate_limit_per_second = 10000
# metrics_bind = "0.0.0.0:9090"

[storage]
data_dir = "./data"
# fsync_mode = "batched"          # per_write | batched | periodic
# fsync_interval_ms = 10          # for batched/periodic modes
# max_segment_bytes = 67108864    # 64 MiB
# max_segment_entries = 100000
# snapshot_interval_entries = 100000
# snapshot_interval_minutes = 60

# --- Authentication ---
#
# When auth.method = "token", clients must AUTH with a configured token
# before any command except PING is accepted.
#
# Each token defines a tenant, actor (audit identity), and namespace grants.
# Platform tokens have unrestricted access across tenants.

# [auth]
# method = "token"
#
# [auth.tokens.my-app-token]
# tenant = "tenant-a"
# actor = "my-app"
# grants = [
#     { namespace = "app.users", scopes = ["read", "write"] },
#     { namespace = "app.sessions", scopes = ["read", "write"] },
# ]
#
# [auth.tokens.admin-token]
# tenant = "platform"
# actor = "admin"
# platform = true    # unrestricted access, cross-tenant capable
