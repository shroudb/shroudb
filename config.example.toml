# ShrouDB Configuration
# Copy to config.toml and adjust for your deployment.

# Master key source (choose one)
# master_key_source = "env"           # reads SHROUDB_MASTER_KEY
# master_key_source = "file"          # reads SHROUDB_MASTER_KEY_FILE
# master_key_source = "aws-kms"       # envelope decryption via AWS KMS
# master_key_source = "gcp-kms"       # envelope decryption via GCP KMS

[server]
bind = "0.0.0.0:6399"
# tls_cert = "/path/to/cert.pem"
# tls_key = "/path/to/key.pem"
# tls_client_ca = "/path/to/ca.pem"  # Enable mTLS (require client certificates)
# unix_socket = "/var/run/shroudb.sock"

# REST API — runs on a separate port. TLS for REST should be handled by a
# reverse proxy (nginx, Caddy, cloud LB) in production. The RESP3 protocol
# supports native TLS via tls_cert/tls_key above.
rest_bind = "0.0.0.0:8080"

# gRPC (not yet implemented)
# grpc_bind = "0.0.0.0:50051"

[storage]
data_dir = "./data"
# WAL fsync mode: "per_write" | "batched" | "periodic"
wal_fsync_mode = "batched"
wal_fsync_interval_ms = 10
wal_segment_max_bytes = 67_108_864  # 64 MiB
snapshot_interval_entries = 100_000
snapshot_interval_minutes = 60

# --- Keyspace Definitions ---

# JWT signing keyspace
[keyspaces.auth-tokens]
type = "jwt"
algorithm = "ES256"                # ES256, ES384, RS256, RS384, RS512, EdDSA
rotation_days = 90
drain_days = 30
pre_stage_days = 7
default_ttl = "15m"
# required_claims = { aud = "my-service" }
# verify_cache_ttl = "30s"

# API key keyspace
[keyspaces.service-keys]
type = "api_key"
prefix = "sk"                      # keys will look like sk_<base62>
hash_algorithm = "sha256"
# disabled = true  # soft-disable: rejects commands but retains data

# Optional metadata schema — validates metadata on ISSUE and UPDATE
# [keyspaces.service-keys.meta_schema]
# enforce = true
#
# [keyspaces.service-keys.meta_schema.fields.org_id]
# type = "string"
# required = true
# immutable = true
#
# [keyspaces.service-keys.meta_schema.fields.plan]
# type = "string"
# required = true
# enum = ["free", "pro", "enterprise"]

# HMAC signing keyspace
[keyspaces.webhooks]
type = "hmac"
algorithm = "sha256"               # sha256, sha384, sha512
rotation_days = 180
drain_days = 14

# Refresh token keyspace
[keyspaces.sessions]
type = "refresh_token"
token_ttl = "30d"
max_chain_length = 100
family_ttl = "90d"

# Password keyspace
[keyspaces.users]
type = "password"
algorithm = "argon2id"
max_failed_attempts = 5
lockout_duration = "15m"

# --- Access Control ---
# Uncomment to require authentication. Without this section, all connections are allowed.

# [auth]
# method = "token"       # "token" or "none"
#
# [auth.policies.admin]
# token = "${SHROUDB_ADMIN_TOKEN}"
